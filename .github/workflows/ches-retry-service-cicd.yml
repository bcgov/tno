name: Ches Retry Service CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/ches-retry/**
      - libs/net/**
      - openshift/kustomize/services/ches-retry/**
      - .github/workflows/ches-retry-service-cicd.yml
  push:
    branches: [dev, master, ches-retry-service]
    paths:
      - services/net/ches-retry/**
      - libs/net/**
      - openshift/kustomize/services/ches-retry/**
      - .github/workflows/ches-retry-service-cicd.yml

concurrency:
  group: ches-retry-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-dotnet-cicd.yml
    with:
      image_name: ches-retry-service
      csproj_path: services/net/ches-retry/TNO.Services.ChesRetry.csproj
      dockerfile: services/net/ches-retry/Dockerfile
      component: ches-retry-service
      deployment_name: ches-retry-service
      kustomize_dev_path: openshift/kustomize/services/ches-retry/overlays/dev
      kustomize_test_path: openshift/kustomize/services/ches-retry/overlays/test
      dev_branch: ches-retry-service
      rollout_timeout: '180s'
      continue_on_error_verify: true
      health_check_method: exec_curl
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      CHES_CLIENT_ID: ${{ secrets.CHES_CLIENT_ID }}
      CHES_CLIENT_SECRET: ${{ secrets.CHES_CLIENT_SECRET }}
      CHES_SENDER_EMAIL: ${{ secrets.CHES_SENDER_EMAIL }}
      CHES_NOTIFY_EMAIL: ${{ secrets.CHES_NOTIFY_EMAIL }}
