name: Reusable .NET CI/CD

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      csproj_path:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      component:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      kustomize_dev_path:
        required: true
        type: string
      kustomize_test_path:
        required: true
        type: string
      dev_branch:
        required: false
        type: string
        default: ''
      rollout_timeout:
        required: false
        type: string
        default: '180s'
      continue_on_error_verify:
        required: false
        type: boolean
        default: false
      resource_type:
        required: false
        type: string
        default: 'deployment'
        description: 'Kubernetes resource kind: deployment or statefulset'
      health_check_method:
        required: false
        type: string
        default: 'exec_curl'
    secrets:
      OPENSHIFT_TOKEN:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      CHES_CLIENT_ID:
        required: false
      CHES_CLIENT_SECRET:
        required: false
      CHES_SENDER_EMAIL:
        required: false
      CHES_NOTIFY_EMAIL:
        required: false

permissions:
  contents: read
  security-events: write

env:
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443
  OPENSHIFT_TOOLS_NAMESPACE: 9b301c-tools
  ACR_URL: bcgov-c4awhwfpcremdbga.azurecr.io

jobs:
  ci:
    name: CI — Validate (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore "${{ inputs.csproj_path }}" --configfile NuGet.Config

      - name: Check vulnerable packages
        run: dotnet list "${{ inputs.csproj_path }}" package --vulnerable --include-transitive

      - name: Lint
        run: dotnet format "${{ inputs.csproj_path }}" --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build "${{ inputs.csproj_path }}" --configuration Release --no-restore

  cd-dev:
    name: CD — Deploy to Dev
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/dev' || (inputs.dev_branch != '' && github.ref == format('refs/heads/{0}', inputs.dev_branch))) && github.repository == 'bcgov/tno'
    environment: dev
    env:
      IMAGE_TAG: dev
      OPENSHIFT_NAMESPACE: 9b301c-dev
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ inputs.dockerfile }} \
            -t ${{ inputs.image_name }}:${{ github.sha }} \
            .

      - name: Trivy Container Scan
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: '${{ inputs.image_name }}:${{ github.sha }}'

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_URL }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Backup current image tag
        continue-on-error: true
        run: |
          echo "Backing up ${{ inputs.image_name }}:${{ env.IMAGE_TAG }} → ${{ inputs.image_name }}:${{ env.IMAGE_TAG }}-backup"
          docker pull ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }} && \
          docker tag \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }} \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}-backup && \
          docker push \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}-backup

      - name: Push Image to ACR
        run: |
          docker tag \
            ${{ inputs.image_name }}:${{ github.sha }} \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}
          docker push \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}

      - name: Deploy via Kustomize
        run: oc apply -k ${{ inputs.kustomize_dev_path }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: |
          oc rollout restart ${{ inputs.resource_type }}/${{ inputs.deployment_name }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Rollout
        continue-on-error: ${{ inputs.continue_on_error_verify }}
        run: |
          oc rollout status ${{ inputs.resource_type }}/${{ inputs.deployment_name }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=${{ inputs.rollout_timeout }}

      - name: Deployment Report
        if: always()
        continue-on-error: true
        env:
          HEALTH_CHECK_METHOD: ${{ inputs.health_check_method }}
        run: |
          echo "--- pod status ---"
          oc get pods -l component=${{ inputs.component }} -n ${{ env.OPENSHIFT_NAMESPACE }}
          echo "--- health check ---"
          POD=$(oc get pod -l component=${{ inputs.component }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}')
          if [ "$HEALTH_CHECK_METHOD" = "port_forward" ]; then
            oc port-forward $POD 8080:8080 -n ${{ env.OPENSHIFT_NAMESPACE }} &
            sleep 10
            curl -sf http://localhost:8080/health
            kill %1
          else
            oc exec $POD -n ${{ env.OPENSHIFT_NAMESPACE }} -- \
              curl -sf http://localhost:8080/health
          fi
          echo "--- recent logs ---"
          sleep 60
          oc logs $POD -n ${{ env.OPENSHIFT_NAMESPACE }} --tail=20

      - name: Notify Deployment Result
        if: always()
        continue-on-error: true
        run: |
          TOKEN=$(curl -s -X POST \
            "https://dev.loginproxy.gov.bc.ca/auth/realms/comsvcauth/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.CHES_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHES_CLIENT_SECRET }}" \
            | jq -r '.access_token')

          if [ "${{ job.status }}" = "success" ]; then
            SUBJECT="Deployment Successful - ${{ inputs.image_name }} to ${{ env.OPENSHIFT_NAMESPACE }}"
          else
            SUBJECT="Deployment FAILED - ${{ inputs.image_name }} to ${{ env.OPENSHIFT_NAMESPACE }}"
          fi

          curl -s -X POST "https://ches-dev.api.gov.bc.ca/api/v1/email" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${{ secrets.CHES_SENDER_EMAIL }}\",
              \"to\": [\"${{ secrets.CHES_NOTIFY_EMAIL }}\"],
              \"subject\": \"$SUBJECT\",
              \"bodyType\": \"text\",
              \"body\": \"SHA: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

  cd-test:
    name: CD — Deploy to Test
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' && github.repository == 'bcgov/tno'
    environment: test
    env:
      IMAGE_TAG: test
      OPENSHIFT_NAMESPACE: 9b301c-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ inputs.dockerfile }} \
            -t ${{ inputs.image_name }}:${{ github.sha }} \
            .

      - name: Trivy Container Scan
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: '${{ inputs.image_name }}:${{ github.sha }}'

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_URL }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Backup current image tag
        continue-on-error: true
        run: |
          echo "Backing up ${{ inputs.image_name }}:${{ env.IMAGE_TAG }} → ${{ inputs.image_name }}:${{ env.IMAGE_TAG }}-backup"
          docker pull ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }} && \
          docker tag \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }} \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}-backup && \
          docker push \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}-backup

      - name: Push Image to ACR
        run: |
          docker tag \
            ${{ inputs.image_name }}:${{ github.sha }} \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}
          docker push \
            ${{ env.ACR_URL }}/${{ inputs.image_name }}:${{ env.IMAGE_TAG }}

      - name: Deploy via Kustomize
        run: oc apply -k ${{ inputs.kustomize_test_path }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: |
          oc rollout restart ${{ inputs.resource_type }}/${{ inputs.deployment_name }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Rollout
        continue-on-error: ${{ inputs.continue_on_error_verify }}
        run: |
          oc rollout status ${{ inputs.resource_type }}/${{ inputs.deployment_name }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=${{ inputs.rollout_timeout }}

      - name: Deployment Report
        if: always()
        continue-on-error: true
        env:
          HEALTH_CHECK_METHOD: ${{ inputs.health_check_method }}
        run: |
          echo "--- pod status ---"
          oc get pods -l component=${{ inputs.component }} -n ${{ env.OPENSHIFT_NAMESPACE }}
          echo "--- health check ---"
          POD=$(oc get pod -l component=${{ inputs.component }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}')
          if [ "$HEALTH_CHECK_METHOD" = "port_forward" ]; then
            oc port-forward $POD 8080:8080 -n ${{ env.OPENSHIFT_NAMESPACE }} &
            sleep 10
            curl -sf http://localhost:8080/health
            kill %1
          else
            oc exec $POD -n ${{ env.OPENSHIFT_NAMESPACE }} -- \
              curl -sf http://localhost:8080/health
          fi
          echo "--- recent logs ---"
          sleep 60
          oc logs $POD -n ${{ env.OPENSHIFT_NAMESPACE }} --tail=20

      - name: Notify Deployment Result
        if: always()
        continue-on-error: true
        run: |
          TOKEN=$(curl -s -X POST \
            "https://dev.loginproxy.gov.bc.ca/auth/realms/comsvcauth/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.CHES_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHES_CLIENT_SECRET }}" \
            | jq -r '.access_token')

          if [ "${{ job.status }}" = "success" ]; then
            SUBJECT="Deployment Successful - ${{ inputs.image_name }} to ${{ env.OPENSHIFT_NAMESPACE }}"
          else
            SUBJECT="Deployment FAILED - ${{ inputs.image_name }} to ${{ env.OPENSHIFT_NAMESPACE }}"
          fi

          curl -s -X POST "https://ches-dev.api.gov.bc.ca/api/v1/email" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${{ secrets.CHES_SENDER_EMAIL }}\",
              \"to\": [\"${{ secrets.CHES_NOTIFY_EMAIL }}\"],
              \"subject\": \"$SUBJECT\",
              \"bodyType\": \"text\",
              \"body\": \"SHA: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
