name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to roll back"
        required: true
        type: choice
        options:
          - editor
          - subscriber
          - folder-collection
          - api
          - charts-api
          - auto-clipper
          - ches-retry
          - content
          - contentmigration
          - event-handler
          - extract-quotes
          - ffmpeg
          - filemonitor
          - image
          - indexing
          - nlp
          - notification
          - reporting
          - scheduler
          - syndication
          - transcription
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test

permissions:
  contents: read

env:
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443
  ACR_URL: bcgov-c4awhwfpcremdbga.azurecr.io

jobs:
  rollback:
    name: Rollback ${{ inputs.service }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      IMAGE_TAG: ${{ inputs.environment }}
      OPENSHIFT_NAMESPACE: 9b301c-${{ inputs.environment }}
    steps:
      - name: Set service names
        id: svc
        run: |
          RESTYPE="deployment"
          case "${{ inputs.service }}" in
            editor)             IMAGE="editor";                      DEPLOY="editor";                      DISPLAY="React Editor" ;;
            subscriber)         IMAGE="subscriber";                  DEPLOY="subscriber";                  DISPLAY="React Subscriber" ;;
            folder-collection)  IMAGE="folder-collection-service";   DEPLOY="folder-collection-service";   DISPLAY="Folder Collection" ;;
            api)                IMAGE="api";                         DEPLOY="api-services";                DISPLAY="API (.NET)" ;;
            charts-api)         IMAGE="charts-api";                  DEPLOY="charts-api";                  DISPLAY="Charts API" ;;
            *)                  IMAGE="${{ inputs.service }}-service"; DEPLOY="${{ inputs.service }}-service"; DISPLAY="${{ inputs.service }}" ;;
          esac
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "deploy=$DEPLOY" >> $GITHUB_OUTPUT
          echo "display=$DISPLAY" >> $GITHUB_OUTPUT
          echo "resource_type=$RESTYPE" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_URL }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Verify backup image exists
        run: |
          echo "Checking that ${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-backup exists in ACR..."
          docker pull ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-backup || {
            echo "::error::No backup image found for ${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-backup in ACR."
            exit 1
          }
          echo "✅ Backup image found."

      - name: Swap current and backup tags
        run: |
          echo "Swapping ${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }} ↔ ${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-backup"

          # Pull current image
          docker pull ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}

          # Save current as backup (overwrite old backup)
          docker tag \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }} \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-rollback-tmp

          # Restore backup as current
          docker tag \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-backup \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}
          docker push \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}

          # Move old current to backup (enables "undo rollback")
          docker tag \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-rollback-tmp \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-backup
          docker push \
            ${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }}-backup

          echo "✅ Tags swapped successfully in ACR."

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Rollout Restart
        run: |
          oc rollout restart ${{ steps.svc.outputs.resource_type }}/${{ steps.svc.outputs.deploy }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Rollout
        run: |
          oc rollout status ${{ steps.svc.outputs.resource_type }}/${{ steps.svc.outputs.deploy }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=180s

      - name: Rollout API StatefulSet
        if: ${{ inputs.service == 'api' }}
        continue-on-error: true
        run: |
          oc set image statefulset/api api=${{ env.ACR_URL }}/${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }}
          oc rollout restart statefulset/api -n ${{ env.OPENSHIFT_NAMESPACE }}
          oc rollout status statefulset/api -n ${{ env.OPENSHIFT_NAMESPACE }} --timeout=180s

      - name: Rollback Summary
        if: always()
        run: |
          echo "## ⏪ Rollback Summary — ${{ steps.svc.outputs.display }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ steps.svc.outputs.display }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | ${{ env.OPENSHIFT_NAMESPACE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | ${{ steps.svc.outputs.image }}:${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Action** | Swapped \`${{ env.IMAGE_TAG }}\` ↔ \`${{ env.IMAGE_TAG }}-backup\` in ACR |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workflow Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp (UTC)** | $(date -u '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Running this workflow again will swap the tags back (undo the rollback)." >> $GITHUB_STEP_SUMMARY
