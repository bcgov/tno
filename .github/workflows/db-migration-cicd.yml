name: DB Migration CI/CD

on:
  push:
    branches: [dev, master]
    paths:
      - 'libs/net/dal/**'
      - 'libs/net/entities/**'
      - 'libs/net/Dockerfile'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - test

permissions:
  contents: read
  security-events: write

env:
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443
  OPENSHIFT_TOOLS_NAMESPACE: 9b301c-tools
  IMAGE_NAME: db-migration
  DOCKER_CONTEXT: libs/net
  DOCKERFILE: libs/net/Dockerfile

jobs:
  ci:
    name: CI — Validate (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore "libs/net/TNO.sln" --configfile NuGet.Config

      - name: Build DAL
        run: dotnet build "libs/net/dal/TNO.DAL.csproj" --configuration Release --no-restore

  cd-dev:
    name: CD — Migrate Dev DB
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/dev' && github.repository == 'bcgov/tno') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    environment: dev
    env:
      IMAGE_TAG: dev
      OPENSHIFT_NAMESPACE: 9b301c-dev
      DB_SECRET_NAME: montford
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ env.DOCKERFILE }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.DOCKER_CONTEXT }}

      - name: Trivy Container Scan
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Backup current image tag
        run: |
          echo "Backing up ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} → ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup"
          oc tag \
            "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup" \
            -n ${{ env.OPENSHIFT_TOOLS_NAMESPACE }} 2>/dev/null || true

      - name: Login to OpenShift Image Registry
        run: |
          echo "${{ secrets.OPENSHIFT_TOKEN }}" | docker login \
            image-registry.apps.silver.devops.gov.bc.ca \
            -u serviceaccount \
            --password-stdin

      - name: Push Image to OpenShift Registry
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Run Database Migration
        run: |
          echo "Running EF Core database migration in ${{ env.OPENSHIFT_NAMESPACE }}"

          # Delete any leftover migration pod from a previous failed run
          oc delete pod ${{ env.IMAGE_NAME }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --ignore-not-found=true

          oc run ${{ env.IMAGE_NAME }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --image=image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --image-pull-policy=Always \
            --attach \
            --rm \
            --labels='role=migration,part-of=tno,component=database' \
            --restart=Never \
            --timeout=10m \
            --override-type='merge' \
            --overrides='{
              "apiVersion":"v1",
              "spec":{
                "containers":[
                  {
                    "name":"${{ env.IMAGE_NAME }}",
                    "image":"image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}",
                    "env":[
                      {
                        "name":"ConnectionStrings__TNO",
                        "valueFrom":{
                          "configMapKeyRef":{
                            "name":"api",
                            "key":"CONNECTION_STRING"
                          }
                        }
                      },
                      {
                        "name":"DB_POSTGRES_USERNAME",
                        "valueFrom":{
                          "secretKeyRef":{
                            "name":"${{ env.DB_SECRET_NAME }}",
                            "key":"USERNAME"
                          }
                        }
                      },
                      {
                        "name":"DB_POSTGRES_PASSWORD",
                        "valueFrom":{
                          "secretKeyRef":{
                            "name":"${{ env.DB_SECRET_NAME }}",
                            "key":"PASSWORD"
                          }
                        }
                      }
                    ],
                    "resources":{
                      "requests":{
                        "memory":"1Gi",
                        "cpu":"500m"
                      },
                      "limits":{
                        "memory":"2Gi",
                        "cpu":"1000m"
                      }
                    }
                  }
                ]
              }
            }'

      - name: Migration Report
        if: always()
        continue-on-error: true
        run: |
          echo "--- migration pod status ---"
          oc get pods -l role=migration,component=database \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --sort-by=.metadata.creationTimestamp 2>/dev/null || true

  cd-test:
    name: CD — Migrate Test DB
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'bcgov/tno') ||
