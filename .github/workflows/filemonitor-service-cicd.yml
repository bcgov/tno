name: File Monitor Service CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/filemonitor/**
      - libs/net/**
      - openshift/kustomize/services/filemonitor/**
      - .github/workflows/filemonitor-service-cicd.yml
  push:
    branches: [dev, master, filemonitor-service]
    paths:
      - services/net/filemonitor/**
      - libs/net/**
      - openshift/kustomize/services/filemonitor/**
      - .github/workflows/filemonitor-service-cicd.yml

concurrency:
  group: filemonitor-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-dotnet-cicd.yml
    with:
      image_name: filemonitor-service
      csproj_path: services/net/filemonitor/TNO.Services.FileMonitor.csproj
      dockerfile: services/net/filemonitor/Dockerfile
      component: filemonitor-service
      deployment_name: filemonitor-service
      kustomize_dev_path: openshift/kustomize/services/filemonitor/overlays/dev
      kustomize_test_path: openshift/kustomize/services/filemonitor/overlays/test
      dev_branch: filemonitor-service
      rollout_timeout: '180s'
      continue_on_error_verify: true
      health_check_method: exec_curl
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
