---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: 9b301c-prod

resources:
  - ../../base

patches:
  - target:
      kind: Route
      name: charts-api
    patch: |-
      - op: replace
        path: /spec/host
        value: tno-charts-api.apps.silver.devops.gov.bc.ca
  - target:
      kind: Deployment
      name: charts-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: bcgov-c4awhwfpcremdbga.azurecr.io/charts-api:prod
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 20m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 75Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 35m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 250Mi
