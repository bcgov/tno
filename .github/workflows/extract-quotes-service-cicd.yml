name: Extract Quotes Service CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/extract-quotes/**
      - libs/net/**
      - openshift/kustomize/services/extract-quotes/**
      - .github/workflows/extract-quotes-service-cicd.yml
  push:
    branches: [dev, master, extract-quotes-service]
    paths:
      - services/net/extract-quotes/**
      - libs/net/**
      - openshift/kustomize/services/extract-quotes/**
      - .github/workflows/extract-quotes-service-cicd.yml

concurrency:
  group: extract-quotes-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-dotnet-cicd.yml
    with:
      image_name: extract-quotes-service
      csproj_path: services/net/extract-quotes/TNO.Services.ExtractQuotes.csproj
      dockerfile: services/net/extract-quotes/Dockerfile
      component: extract-quotes-service
      deployment_name: extract-quotes-service
      kustomize_dev_path: openshift/kustomize/services/extract-quotes/overlays/dev
      kustomize_test_path: openshift/kustomize/services/extract-quotes/overlays/test
      dev_branch: extract-quotes-service
      rollout_timeout: '180s'
      continue_on_error_verify: true
      health_check_method: exec_curl
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
