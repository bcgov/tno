name: React Subscriber Application

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - app/subscriber/**
      - openshift/kustomize/app/subscriber/**
      - .github/workflows/react-subscriber.yml
  push:
    branches: [dev, master, react-editor-subscriber]
    paths:
      - app/subscriber/**
      - openshift/kustomize/app/subscriber/**
      - .github/workflows/react-subscriber.yml

concurrency:
  group: react-subscriber-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WORKING_DIRECTORY: ./app/subscriber
  IMAGE_NAME: subscriber
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443
  OPENSHIFT_TOOLS_NAMESPACE: 9b301c-tools

jobs:
  ci:
    name: CI — Validate (NodeJS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use NodeJs 18.11.0
        uses: actions/setup-node@v4
        with:
          node-version: "18.11.0"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Set Yarn Version
        run: npm set version 3.2.0

      - name: Update Browsers List
        run: npx update-browserslist-db@latest
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Install Dependencies
        run: yarn
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Linting
        run: yarn lint
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Building
        run: yarn build --if-present
        working-directory: ${{ env.WORKING_DIRECTORY }}

  cd-dev:
    name: CD — Deploy to Dev
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/react-editor-subscriber') && github.repository == 'bcgov/tno'
    environment:
      name: dev
      url: https://dev.mmi.gov.bc.ca
    env:
      IMAGE_TAG: dev
      OPENSHIFT_NAMESPACE: 9b301c-dev
      KUSTOMIZE_PATH: openshift/kustomize/app/subscriber/overlays/dev
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f app/subscriber/Dockerfile.nginx \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --build-arg REACT_APP_VERSION=${{ github.sha }} \
            ./app/subscriber

      - name: Login to OpenShift Image Registry
        run: |
          echo "${{ secrets.OPENSHIFT_TOKEN }}" | docker login \
            image-registry.apps.silver.devops.gov.bc.ca \
            -u serviceaccount \
            --password-stdin

      - name: Push Image to OpenShift Registry
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Deploy via Kustomize
        run: oc apply -k ${{ env.KUSTOMIZE_PATH }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: |
          oc rollout restart deployment/subscriber \
            -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Deployment
        run: |
          oc rollout status deployment/subscriber \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=180s

  cd-test:
    name: CD — Deploy to Test
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' && github.repository == 'bcgov/tno'
    environment:
      name: test
      url: https://test.mmi.gov.bc.ca
    env:
      IMAGE_TAG: test
      OPENSHIFT_NAMESPACE: 9b301c-test
      KUSTOMIZE_PATH: openshift/kustomize/app/subscriber/overlays/test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f app/subscriber/Dockerfile.nginx \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --build-arg REACT_APP_VERSION=${{ github.sha }} \
            ./app/subscriber

      - name: Login to OpenShift Image Registry
        run: |
          echo "${{ secrets.OPENSHIFT_TOKEN }}" | docker login \
            image-registry.apps.silver.devops.gov.bc.ca \
            -u serviceaccount \
            --password-stdin

      - name: Push Image to OpenShift Registry
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Deploy via Kustomize
        run: oc apply -k ${{ env.KUSTOMIZE_PATH }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: |
          oc rollout restart deployment/subscriber \
            -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Deployment
        run: |
          oc rollout status deployment/subscriber \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=180s
