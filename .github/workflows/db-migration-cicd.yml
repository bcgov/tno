name: DB Migration CI/CD

on:
  push:
    branches: [dev, master]
    paths:
      - 'libs/net/dal/**'
      - 'libs/net/entities/**'
      - 'libs/net/Dockerfile'
  pull_request:
    branches: [dev, master]
    paths:
      - 'libs/net/dal/**'
      - 'libs/net/entities/**'
      - 'libs/net/Dockerfile'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - test

concurrency:
  group: db-migration-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    name: CI — Validate (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore "libs/net/TNO.sln" --configfile NuGet.Config

      - name: Build DAL
        run: dotnet build "libs/net/dal/TNO.DAL.csproj" --configuration Release --no-restore

  cd-dev:
    name: CD — Migrate Dev DB
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/dev' && github.repository == 'bcgov/tno') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    uses: ./.github/workflows/_reusable-db-migration-cd.yml
    with:
      environment: dev
      image_tag: dev
      openshift_namespace: 9b301c-dev
      db_secret_name: montford
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

  cd-test:
    name: CD — Migrate Test DB
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'bcgov/tno') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'test')
    uses: ./.github/workflows/_reusable-db-migration-cd.yml
    with:
      environment: test
      image_tag: test
      openshift_namespace: 9b301c-test
      db_secret_name: mooncrest
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
