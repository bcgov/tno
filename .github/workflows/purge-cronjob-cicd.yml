name: Purge CronJob CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - openshift/kustomize/cron/purge/**
      - .github/workflows/purge-cronjob-cicd.yml
  push:
    branches: [dev, master]
    paths:
      - openshift/kustomize/cron/purge/**
      - .github/workflows/purge-cronjob-cicd.yml

concurrency:
  group: purge-cronjob-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443

jobs:
  ci:
    name: CI — Validate Kustomize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Validate dev overlay
        run: oc kustomize openshift/kustomize/cron/purge/overlays/dev > /dev/null

      - name: Validate test overlay
        run: oc kustomize openshift/kustomize/cron/purge/overlays/test > /dev/null

  cd-dev:
    name: CD — Deploy to Dev
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev' && github.repository == 'bcgov/tno'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        uses: ./.github/actions/openshift-login
        with:
          token: ${{ secrets.OPENSHIFT_TOKEN }}
          server: ${{ env.OPENSHIFT_SERVER }}

      - name: Deploy CronJob via Kustomize
        run: oc apply -k openshift/kustomize/cron/purge/overlays/dev -n 9b301c-dev

      - name: Verify CronJob
        run: oc get cronjob purge-service -n 9b301c-dev

  cd-test:
    name: CD — Deploy to Test
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && github.repository == 'bcgov/tno'
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        uses: ./.github/actions/openshift-login
        with:
          token: ${{ secrets.OPENSHIFT_TOKEN }}
          server: ${{ env.OPENSHIFT_SERVER }}

      - name: Deploy CronJob via Kustomize
        run: oc apply -k openshift/kustomize/cron/purge/overlays/test -n 9b301c-test

      - name: Verify CronJob
        run: oc get cronjob purge-service -n 9b301c-test
