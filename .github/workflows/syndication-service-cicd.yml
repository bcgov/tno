name: Syndication Service CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/syndication/**
      - libs/net/**
      - openshift/kustomize/services/syndication/**
      - .github/workflows/syndication-service-cicd.yml
  push:
    branches: [dev, master]
    paths:
      - services/net/syndication/**
      - libs/net/**
      - openshift/kustomize/services/syndication/**
      - .github/workflows/syndication-service-cicd.yml

concurrency:
  group: syndication-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-dotnet-cicd.yml
    with:
      image_name: syndication-service
      csproj_path: services/net/syndication/TNO.Services.Syndication.csproj
      dockerfile: services/net/syndication/Dockerfile
      component: syndication-service
      deployment_name: syndication-service
      kustomize_dev_path: openshift/kustomize/services/syndication/overlays/dev
      kustomize_test_path: openshift/kustomize/services/syndication/overlays/test
      dev_branch: feature/syndication-service-cicd
      rollout_timeout: '180s'
      continue_on_error_verify: true
      health_check_method: exec_curl
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
