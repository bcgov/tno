apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: oc-deploy-with-tag
  description: >-
    This task will tag a specific image with the environment name. This will
    deploy the image if there is a DeployConfig trigger listening for the
    environment tag.
  annotations:
    tekton.dev/displayName: openshift client
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: cli
  labels:
    name: oc-deploy-with-tag
    part-of: tno
    version: 1.0.0
    component: task
    managed-by: kustomize
spec:
  params:
    - name: PROJECT_SHORTNAME
      description: The project namespace.
      type: string
      default: 9b301c
    - name: IMAGE
      description: The name given to the built image.
      type: string
    - name: IMAGE_TAG
      description: The tag given to the built image.
      type: string
      default: latest
    - name: ENV
      description: The environment to deploy to.
      type: string
    - name: TIMEOUT
      description: The timeout before it will stop waiting for the pod to become available.
      type: string
      default: "600s"
    - name: OBJECT
      description: The kubernetes object that will be deployed [dc|sts]
      type: string
      default: deployment
    - name: ACR_REGISTRY
      description: The Azure Container Registry URL (leave empty to skip ACR tagging).
      type: string
      default: "bcgov-c4awhwfpcremdbga.azurecr.io"

  steps:
    - name: tag-acr
      image: bcgov-c4awhwfpcremdbga.azurecr.io/buildah:latest
      securityContext:
        capabilities:
          add:
            - SETFCAP
        runAsUser: 0
      env:
        - name: IMAGE_REGISTRY_USER
          valueFrom:
            secretKeyRef:
              name: pipelines
              key: username
        - name: IMAGE_REGISTRY_PASS
          valueFrom:
            secretKeyRef:
              name: pipelines
              key: password
      script: |
        #!/usr/bin/env bash
        set -e

        if [ -z "$(params.ACR_REGISTRY)" ]; then
          echo "ACR_REGISTRY not set, skipping ACR tagging"
          exit 0
        fi

        CREDS=""
        if [ ! -z "$IMAGE_REGISTRY_USER" ]; then
          echo "Setting up buildah login credentials for $(params.ACR_REGISTRY)"
          CREDS="--creds $IMAGE_REGISTRY_USER:$IMAGE_REGISTRY_PASS"
        fi

        echo "Tagging $(params.ACR_REGISTRY)/$(params.IMAGE):$(params.IMAGE_TAG) → :$(params.ENV)"
        IMAGE_ID=$(buildah --storage-driver=vfs pull $CREDS \
          docker://$(params.ACR_REGISTRY)/$(params.IMAGE):$(params.IMAGE_TAG))
        buildah --storage-driver=vfs tag $IMAGE_ID \
          $(params.ACR_REGISTRY)/$(params.IMAGE):$(params.ENV)
        buildah --storage-driver=vfs push $CREDS \
          $(params.ACR_REGISTRY)/$(params.IMAGE):$(params.ENV)
        buildah --storage-driver=vfs rmi --force $IMAGE_ID

    - name: deploy
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      resources: {}
      script: |
        set -xe

        if [[ -z "$(params.ACR_REGISTRY)" ]]; then
          echo "Tagging image to trigger deployment to $(params.ENV)"
          oc tag $(params.IMAGE):$(params.IMAGE_TAG) $(params.IMAGE):$(params.ENV)
        fi

        echo "Waiting for deployment to roll out"
        oc rollout restart $(params.OBJECT)/$(params.IMAGE) -n $(params.PROJECT_SHORTNAME)-$(params.ENV)

        # oc wait --for=condition=available --timeout=$(params.TIMEOUT) $(params.OBJECT)/$(params.IMAGE) -n $(params.PROJECT_SHORTNAME)-$(params.ENV)
        oc rollout status --watch --timeout=$(params.TIMEOUT) $(params.OBJECT)/$(params.IMAGE) -n $(params.PROJECT_SHORTNAME)-$(params.ENV)

        # timeout(10) {
        # dc.rollout().status('--watch=true')
        # }
