name: Reporting Service CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/reporting/**
      - libs/net/**
      - openshift/kustomize/services/reporting/**
      - .github/workflows/reporting-service-cicd.yml
  push:
    branches: [dev, master, reporting-service]
    paths:
      - services/net/reporting/**
      - libs/net/**
      - openshift/kustomize/services/reporting/**
      - .github/workflows/reporting-service-cicd.yml

concurrency:
  group: reporting-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-dotnet-cicd.yml
    with:
      image_name: reporting-service
      csproj_path: services/net/reporting/TNO.Services.Reporting.csproj
      dockerfile: services/net/reporting/Dockerfile
      component: reporting-service
      deployment_name: reporting-service
      kustomize_dev_path: openshift/kustomize/services/reporting/overlays/dev
      kustomize_test_path: openshift/kustomize/services/reporting/overlays/test
      dev_branch: reporting-service
      rollout_timeout: '180s'
      continue_on_error_verify: true
      health_check_method: exec_curl
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
