name: Auto Clipper CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/auto-clipper/**
      - libs/net/**
      - openshift/kustomize/services/auto-clipper/**
      - .github/workflows/auto-clipper-cicd.yml
  push:
    branches: [dev, master, auto-clipper]
    paths:
      - services/net/auto-clipper/**
      - libs/net/**
      - openshift/kustomize/services/auto-clipper/**
      - .github/workflows/auto-clipper-cicd.yml

concurrency:
  group: auto-clipper-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-dotnet-cicd.yml
    with:
      image_name: auto-clipper-service
      csproj_path: services/net/auto-clipper/TNO.Services.AutoClipper.csproj
      dockerfile: services/net/auto-clipper/Dockerfile
      component: auto-clipper-service
      deployment_name: auto-clipper-service
      kustomize_dev_path: openshift/kustomize/services/auto-clipper/overlays/dev
      kustomize_test_path: openshift/kustomize/services/auto-clipper/overlays/test
      dev_branch: auto-clipper
      rollout_timeout: '180s'
      continue_on_error_verify: true
      health_check_method: exec_curl
    secrets:
      OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
