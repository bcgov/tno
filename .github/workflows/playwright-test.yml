name: Playwright E2E (Test Env)

# Manual-only workflow. Runs the Playwright automation suite against the TEST
# environment. Credentials/config are pulled from the GitHub "test" Environment
# (Settings -> Environments -> test) so this can only ever target test.
on:
  workflow_dispatch:

concurrency:
  group: playwright-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright — Test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: test
    defaults:
      run:
        working-directory: ./playwright-automation
    env:
      CI: "true"
      HEADLESS: "true"
      ENV: test
      APP_NAME: ${{ vars.APP_NAME }}
      EDITOR_URL: ${{ vars.EDITOR_URL }}
      SUBSCRIBER_URL: ${{ vars.SUBSCRIBER_URL }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      MAIL_TO: ${{ vars.MAIL_TO }}
      TEST_TIMEOUT: ${{ vars.TEST_TIMEOUT }}
      ACTION_TIMEOUT: ${{ vars.ACTION_TIMEOUT }}
      APP_USERNAME: ${{ secrets.APP_USERNAME }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      SUB_USERNAME: ${{ secrets.SUB_USERNAME }}
      SUB_PASSWORD: ${{ secrets.SUB_PASSWORD }}
      SUB_USERNAME1: ${{ secrets.SUB_USERNAME1 }}
      SUB_PASSWORD1: ${{ secrets.SUB_PASSWORD1 }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Use NodeJS 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: playwright-automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        continue-on-error: true
        run: npx playwright test

      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npx allure generate allure-results --clean -o allure-report

      - name: Allure summary
        if: ${{ !cancelled() }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const widgetFile = path.join('allure-report', 'widgets', 'summary.json');
            if (fs.existsSync(widgetFile)) {
              const data = JSON.parse(fs.readFileSync(widgetFile, 'utf8'));
              const s = data.statistic || {};
              const total = (s.total || 0);
              const passed = (s.passed || 0);
              const failed = (s.failed || 0);
              const broken = (s.broken || 0);
              const skipped = (s.skipped || 0);
              const pct = total > 0 ? ((passed/total)*100).toFixed(1) : '0.0';
              const summary = '## Allure Test Results\n' +
                '| Status | Count |\n|---|---|\n' +
                '| Passed | ' + passed + ' |\n' +
                '| Failed | ' + failed + ' |\n' +
                '| Broken | ' + broken + ' |\n' +
                '| Skipped | ' + skipped + ' |\n' +
                '| **Total** | **' + total + '** |\n' +
                '| **Pass rate** | **' + pct + '%** |\n\n' +
                '### View Full Report\n' +
                'Download the **allure-report** artifact, unzip, then run: ' +
                '\`npx allure open allure-report\`\n';
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
              console.log('Allure: ' + pct + '% (' + passed + '/' + total + ')');
            } else {
              console.log('No Allure summary widget found');
            }
          "

      - name: Upload Allure report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwright-automation/allure-report/
          retention-days: 30
