name: Folder Collection CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/folder-collection/**
      - libs/net/**
      - openshift/kustomize/services/folder-collection/**
      - .github/workflows/folder-collection-cicd.yml
  push:
    branches: [dev, master, folder-collection]
    paths:
      - services/net/folder-collection/**
      - libs/net/**
      - openshift/kustomize/services/folder-collection/**
      - .github/workflows/folder-collection-cicd.yml

concurrency:
  group: folder-collection-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CSPROJ_PATH: services/net/folder-collection/TNO.Services.FolderCollection.csproj
  IMAGE_NAME: folder-collection-service
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443
  OPENSHIFT_TOOLS_NAMESPACE: 9b301c-tools

jobs:
  ci:
    name: CI — Validate (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore "${{ env.CSPROJ_PATH }}"

      - name: Check vulnerable packages
        run: dotnet list "${{ env.CSPROJ_PATH }}" package --vulnerable --include-transitive

      - name: Lint
        run: dotnet format "${{ env.CSPROJ_PATH }}" --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build "${{ env.CSPROJ_PATH }}" --configuration Release --no-restore

  cd-dev:
    name: CD — Deploy to Dev
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/folder-collection') && github.repository == 'bcgov/tno'
    environment: dev
    env:
      IMAGE_TAG: dev
      OPENSHIFT_NAMESPACE: 9b301c-dev
      KUSTOMIZE_PATH: openshift/kustomize/services/folder-collection/overlays/dev
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f services/net/folder-collection/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Login to OpenShift Image Registry
        run: |
          echo "${{ secrets.OPENSHIFT_TOKEN }}" | docker login \
            image-registry.apps.silver.devops.gov.bc.ca \
            -u serviceaccount \
            --password-stdin

      - name: Push Image to OpenShift Registry
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Deploy via Kustomize
        run: oc apply -k ${{ env.KUSTOMIZE_PATH }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: |
          oc rollout restart deployment/folder-collection-service \
            -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Deployment
        run: |
          oc rollout status deployment/folder-collection-service \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=120s


  cd-test:
    name: CD — Deploy to Test
    runs-on: ubuntu-latest
    needs: ci
    if: false
    environment: test
    env:
      IMAGE_TAG: test
      OPENSHIFT_NAMESPACE: 9b301c-test
      KUSTOMIZE_PATH: openshift/kustomize/services/folder-collection/overlays/test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f services/net/folder-collection/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Login to OpenShift Image Registry
        run: |
          echo "${{ secrets.OPENSHIFT_TOKEN }}" | docker login \
            image-registry.apps.silver.devops.gov.bc.ca \
            -u serviceaccount \
            --password-stdin

      - name: Push Image to OpenShift Registry
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push \
            image-registry.apps.silver.devops.gov.bc.ca/${{ env.OPENSHIFT_TOOLS_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Deploy via Kustomize
        run: oc apply -k ${{ env.KUSTOMIZE_PATH }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: |
          oc rollout restart deployment/folder-collection-service \
            -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Deployment
        run: |
          oc rollout status deployment/folder-collection-service \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=180s

