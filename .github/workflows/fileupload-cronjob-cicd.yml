name: File Upload CronJob CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - services/net/fileupload/**
      - libs/net/**
      - openshift/kustomize/cron/fileupload/**
      - .github/workflows/fileupload-cronjob-cicd.yml
  push:
    branches: [dev, master]
    paths:
      - services/net/fileupload/**
      - libs/net/**
      - openshift/kustomize/cron/fileupload/**
      - .github/workflows/fileupload-cronjob-cicd.yml

concurrency:
  group: fileupload-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443
  ACR_URL: bcgov-c4awhwfpcremdbga.azurecr.io
  IMAGE_NAME: fileupload-service
  CSPROJ_PATH: services/net/fileupload/TNO.Services.FileUpload.csproj
  DOCKERFILE: services/net/fileupload/Dockerfile

jobs:
  ci:
    name: CI — Validate (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore "${{ env.CSPROJ_PATH }}" --configfile NuGet.Config

      - name: Check vulnerable packages
        run: dotnet list "${{ env.CSPROJ_PATH }}" package --vulnerable --include-transitive

      - name: Lint
        run: dotnet format "${{ env.CSPROJ_PATH }}" --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build "${{ env.CSPROJ_PATH }}" --configuration Release --no-restore

  cd-dev:
    name: CD — Deploy to Dev
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev' && github.repository == 'bcgov/tno'
    environment: dev
    env:
      IMAGE_TAG: dev
      OPENSHIFT_NAMESPACE: 9b301c-dev
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ env.DOCKERFILE }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Trivy Container Scan
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        uses: ./.github/actions/openshift-login
        with:
          token: ${{ secrets.OPENSHIFT_TOKEN }}
          server: ${{ env.OPENSHIFT_SERVER }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_URL }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Backup current image tag
        continue-on-error: true
        run: |
          echo "Backing up ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} → ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup"
          docker pull ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} && \
          docker tag \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup && \
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup

      - name: Push Image to ACR
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy CronJob via Kustomize
        run: oc apply -k openshift/kustomize/cron/fileupload/overlays/dev -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify CronJob
        run: oc get cronjob ${{ env.IMAGE_NAME }} -n ${{ env.OPENSHIFT_NAMESPACE }}

  cd-test:
    name: CD — Deploy to Test
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && github.repository == 'bcgov/tno'
    environment: test
    env:
      IMAGE_TAG: test
      OPENSHIFT_NAMESPACE: 9b301c-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ env.DOCKERFILE }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Trivy Container Scan
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        uses: ./.github/actions/openshift-login
        with:
          token: ${{ secrets.OPENSHIFT_TOKEN }}
          server: ${{ env.OPENSHIFT_SERVER }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_URL }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Backup current image tag
        continue-on-error: true
        run: |
          echo "Backing up ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} → ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup"
          docker pull ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} && \
          docker tag \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup && \
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup

      - name: Push Image to ACR
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy CronJob via Kustomize
        run: oc apply -k openshift/kustomize/cron/fileupload/overlays/test -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify CronJob
        run: oc get cronjob ${{ env.IMAGE_NAME }} -n ${{ env.OPENSHIFT_NAMESPACE }}
