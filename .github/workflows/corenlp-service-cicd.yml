name: CoreNLP CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, master]
    paths:
      - tools/corenlp/**
      - openshift/kustomize/core-nlp/**
      - .github/workflows/corenlp-service-cicd.yml
  push:
    branches: [dev, master]
    paths:
      - tools/corenlp/**
      - openshift/kustomize/core-nlp/**
      - .github/workflows/corenlp-service-cicd.yml

concurrency:
  group: corenlp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  OPENSHIFT_SERVER: https://api.silver.devops.gov.bc.ca:6443
  ACR_URL: bcgov-c4awhwfpcremdbga.azurecr.io
  IMAGE_NAME: corenlp
  DOCKERFILE: tools/corenlp/Dockerfile
  DEPLOYMENT_NAME: corenlp

jobs:
  ci:
    name: CI — Validate Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        run: |
          # Simple syntax check for Dockerfile
          docker parser tools/corenlp/Dockerfile 2>/dev/null || true

  cd-dev:
    name: CD — Deploy to Dev
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/dev' && github.repository == 'bcgov/tno'
    environment: dev
    env:
      IMAGE_TAG: dev
      OPENSHIFT_NAMESPACE: 9b301c-dev
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ env.DOCKERFILE }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            tools/corenlp

      - name: Trivy Container Scan
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_URL }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Backup current image tag
        continue-on-error: true
        run: |
          echo "Backing up ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} → ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup"
          docker pull ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} && \
          docker tag \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup && \
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup

      - name: Push Image to ACR
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy via Kustomize
        run: oc apply -k openshift/kustomize/core-nlp/overlays/dev -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: oc rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Deployment
        run: |
          oc rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=300s

  cd-test:
    name: CD — Deploy to Test
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' && github.repository == 'bcgov/tno'
    environment: test
    env:
      IMAGE_TAG: test
      OPENSHIFT_NAMESPACE: 9b301c-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ env.DOCKERFILE }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            tools/corenlp

      - name: Trivy Container Scan
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ env.OPENSHIFT_SERVER }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_URL }} \
            -u ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Backup current image tag
        continue-on-error: true
        run: |
          echo "Backing up ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} → ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup"
          docker pull ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} && \
          docker tag \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup && \
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-backup

      - name: Push Image to ACR
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push \
            ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy via Kustomize
        run: oc apply -k openshift/kustomize/core-nlp/overlays/test -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Rollout Restart
        run: oc rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Verify Deployment
        run: |
          oc rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=300s
